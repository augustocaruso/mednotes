name: Feature request
description: Suggest a focused public educational feature.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests scoped to public medical education workflows.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What study workflow or adapter gap should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what the user should be able to do.
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - core
        - Antigravity CLI
        - opencode
        - documentation
    validations:
      required: true
