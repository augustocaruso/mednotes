name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Verify build
        run: python3 scripts/verify.py --skip-agy

      - name: Package Antigravity bundle
        run: |
          cd dist/antigravity
          zip -r "../mednotes-antigravity-${GITHUB_REF_NAME}.zip" mednotes

      - name: Package opencode npm tarball
        run: |
          cd dist/opencode/package
          npm pack --pack-destination ../../../dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/mednotes-antigravity-${GITHUB_REF_NAME}.zip \
            dist/*.tgz \
            --title "mednotes ${GITHUB_REF_NAME}" \
            --notes "Release artifacts for Antigravity and opencode."
